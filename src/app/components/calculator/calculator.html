<section id="calculator" class="py-12 bg-white relative">
  <div appScrollReveal class="max-w-5xl mx-auto px-6">
    <div class="text-center mb-12">
      <h3 class="text-3xl md:text-4xl font-bold text-slate-800 mb-4">Solar Savings Calculator</h3>
      <p class="text-lg text-slate-500">See how much you could save by switching to clean energy.</p>
    </div>

    <div class="bg-slate-50 rounded-3xl p-8 shadow-xl border border-slate-100 grid md:grid-cols-2 gap-12 items-center">
      
      <!-- Input Section -->
      <div>
        <label class="block text-lg font-bold text-slate-700 mb-2">Average Monthly Power Bill</label>
        <div class="text-3xl md:text-4xl font-extrabold text-eco-green mb-6">${{ monthlyBill }}</div>
        
        <input 
          type="range" 
          min="50" 
          max="1000" 
          step="10" 
          [(ngModel)]="monthlyBill" 
          class="w-full h-3 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-eco-green">
          
        <div class="flex justify-between text-sm text-slate-400 mt-2 font-medium">
          <span>$50</span>
          <span>$1000+</span>
        </div>
      </div>

      <!-- Result Section -->
      <div class="bg-eco-dark text-white rounded-2xl p-8 shadow-lg relative overflow-hidden">
        <div class="absolute top-0 right-0 -mt-4 -mr-4 w-24 h-24 bg-eco-green opacity-20 rounded-full blur-xl"></div>
        <div class="absolute bottom-0 left-0 -mb-4 -ml-4 w-32 h-32 bg-blue-500 opacity-20 rounded-full blur-xl"></div>
        
        <h4 class="text-xl font-medium mb-6 relative z-10">Estimated Savings</h4>
        
        <div class="mb-6 relative z-10">
          <div class="text-slate-300 text-sm mb-1 uppercase tracking-wider font-bold">1 Year Savings</div>
          <div class="text-3xl md:text-4xl font-bold text-eco-green">${{ yearlySavings | number }}</div>
        </div>

        <div class="relative z-10 border-t border-slate-700 pt-6">
          <div class="text-slate-300 text-sm mb-1 uppercase tracking-wider font-bold">20 Year Savings</div>
          <div class="text-4xl md:text-5xl font-extrabold text-white">${{ twentyYearSavings | number }}</div>
        </div>
      </div>

    </div>
  </div>
</section>
