<section id="contact" class="py-24 bg-slate-900 relative overflow-hidden">
  <!-- Background Design Elements -->
  <div class="absolute top-0 left-0 w-full h-full overflow-hidden z-0">
    <div class="absolute -top-[20%] -left-[10%] w-[50%] h-[50%] bg-eco-green opacity-10 rounded-full blur-[100px]"></div>
    <div class="absolute bottom-[10%] -right-[10%] w-[40%] h-[60%] bg-blue-600 opacity-10 rounded-full blur-[100px]"></div>
  </div>

  <div class="max-w-7xl mx-auto px-6 grid lg:grid-cols-2 gap-16 relative z-10">
    
    <!-- Contact Info -->
    <div>
      <h3 class="text-4xl md:text-5xl font-extrabold mb-8 text-white">
        Start Saving Today
      </h3>

      <p class="text-lg text-slate-300 leading-relaxed mb-10">
        We proudly service homes and businesses across Western Australia. Contact our local WA team today for a free consultation and custom solar proposal.
      </p>

      <div class="space-y-8">
        <div class="flex items-start gap-4">
          <div class="w-12 h-12 bg-slate-800 rounded-xl flex items-center justify-center border border-slate-700 shadow-inner">
            <div class="w-4 h-4 bg-eco-green rounded-full"></div>
          </div>
          <div>
            <h4 class="font-bold text-slate-400 uppercase tracking-wider text-sm mb-1">Phone</h4>
            <p class="text-xl text-white font-medium">{{ contact.phone }}</p>
          </div>
        </div>

        <div class="flex items-start gap-4">
          <div class="w-12 h-12 bg-slate-800 rounded-xl flex items-center justify-center border border-slate-700 shadow-inner">
             <div class="w-4 h-4 bg-eco-green rounded-sm"></div>
          </div>
          <div>
            <h4 class="font-bold text-slate-400 uppercase tracking-wider text-sm mb-1">Email</h4>
            <p class="text-xl text-white font-medium">{{ contact.email }}</p>
          </div>
        </div>

        <div class="flex items-start gap-4">
          <div class="w-12 h-12 bg-slate-800 rounded-xl flex items-center justify-center border border-slate-700 shadow-inner">
             <div class="w-0 h-0 border-l-[8px] border-r-[8px] border-b-[14px] border-l-transparent border-r-transparent border-b-eco-green"></div>
          </div>
          <div>
            <h4 class="font-bold text-slate-400 uppercase tracking-wider text-sm mb-1">Office</h4>
            <p class="text-xl text-white font-medium">{{ contact.address }}</p>
          </div>
        </div>
      </div>
    </div>

    <!-- Contact Form -->
    <div class="bg-white rounded-3xl p-8 md:p-10 shadow-2xl border border-slate-100">
      <h4 class="text-2xl font-extrabold mb-8 text-slate-800">
        Request A Free Quote
      </h4>

      <form class="space-y-5">
        <div>
          <label class="block text-sm font-bold text-slate-500 mb-2">Full Name</label>
          <input type="text" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 outline-none focus:border-eco-green focus:bg-white transition-colors text-slate-800 font-medium" />
        </div>

        <div>
          <label class="block text-sm font-bold text-slate-500 mb-2">Phone Number</label>
          <input type="tel" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 outline-none focus:border-eco-green focus:bg-white transition-colors text-slate-800 font-medium" />
        </div>

        <div>
          <label class="block text-sm font-bold text-slate-500 mb-2">Email Address</label>
          <input type="email" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 outline-none focus:border-eco-green focus:bg-white transition-colors text-slate-800 font-medium" />
        </div>

        <button type="button" class="w-full bg-eco-green hover:bg-emerald-400 text-white font-bold text-lg py-4 rounded-xl transition-all shadow-md hover:shadow-lg mt-4">
          Submit Inquiry
        </button>
      </form>
    </div>

  </div>
</section>
