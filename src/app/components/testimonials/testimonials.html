<section id="testimonials" class="pt-24 bg-white">
  <div class="max-w-7xl mx-auto px-6">
    <div class="text-center mb-16">
      <h3 class="text-3xl md:text-5xl font-extrabold text-slate-800 mb-6">What Our Clients Say</h3>
      <p class="max-w-3xl mx-auto text-lg text-slate-500 leading-relaxed">
        Real stories from homes and businesses that have made the switch to solar.
      </p>
    </div>

    <div class="grid md:grid-cols-3 gap-8 mb-24">
      @for (testimonial of testimonials; track testimonial) {
        <div class="bg-slate-50 p-8 rounded-3xl relative mt-8">
          <!-- Quote icon pure css -->
          <div
            class="absolute top-[-24px] left-8 w-12 h-12 bg-eco-green rounded-full flex justify-center items-center text-white text-4xl font-serif leading-none pt-2 shadow-lg"
          >
            "
          </div>
          <p class="text-slate-600 italic mb-6 mt-4 leading-relaxed text-lg">
            "{{ testimonial.text }}"
          </p>
          <div class="border-t border-slate-200 pt-4">
            <h5 class="font-bold text-slate-800">{{ testimonial.name }}</h5>
            <p class="text-sm text-slate-500">{{ testimonial.role }}</p>
          </div>
        </div>
      }
    </div>
    
  </div>
</section>
