<div class="py-16 md:py-24 bg-gradient-to-br from-slate-50 via-white to-slate-100 min-h-screen relative overflow-hidden">
  <!-- Decorative background elements -->
  <div class="absolute top-0 left-0 w-full h-full overflow-hidden pointer-events-none">
    <div class="absolute -top-[20%] right-[10%] w-[40%] h-[40%] rounded-full bg-eco-green/10 blur-[120px]"></div>
    <div class="absolute bottom-[10%] -left-[10%] w-[50%] h-[50%] rounded-full bg-eco-blue/5 blur-[100px]"></div>
  </div>

  @if (product) {
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 relative z-10">
    <a routerLink="/products" class="inline-flex items-center text-eco-green hover:text-eco-dark font-semibold mb-12 transition-colors group">
      <span class="material-symbols-outlined mr-2 group-hover:-translate-x-1 transition-transform">arrow_back</span>
      Back to Products
    </a>
    
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-12 lg:gap-16">
      <!-- Image Column -->
      <div appScrollReveal class="w-full lg:sticky lg:top-28 lg:self-start">
        <!-- Main Image Carousel Container -->
        <div class="relative rounded-xl overflow-hidden shadow-[0_20px_50px_rgba(0,0,0,0.05)] bg-white/80 border border-slate-200 aspect-square md:aspect-[4/3] group backdrop-blur-sm">
          <div class="absolute inset-0 bg-gradient-to-tr from-slate-900/10 to-transparent z-10 pointer-events-none"></div>
          <img [src]="selectedImage" [alt]="product.title" loading="eager" class="w-full h-full object-cover transition-transform duration-700 hover:scale-105" />
          
          @if (product.images && product.images.length > 1) {
          <!-- Carousel Arrows -->
          <button (click)="prevImage()" class="absolute left-6 top-1/2 -translate-y-1/2 bg-white/80 hover:bg-white backdrop-blur-md text-slate-800 p-3 rounded-full shadow-lg opacity-0 group-hover:opacity-100 transition-all duration-300 focus:outline-none z-20 border border-slate-200 hover:scale-110">
            <span class="material-symbols-outlined block text-2xl">chevron_left</span>
          </button>
          <button (click)="nextImage()" class="absolute right-6 top-1/2 -translate-y-1/2 bg-white/80 hover:bg-white backdrop-blur-md text-slate-800 p-3 rounded-full shadow-lg opacity-0 group-hover:opacity-100 transition-all duration-300 focus:outline-none z-20 border border-slate-200 hover:scale-110">
            <span class="material-symbols-outlined block text-2xl">chevron_right</span>
          </button>

          <!-- Floating Dots Indicators -->
          <div class="absolute bottom-8 left-1/2 -translate-x-1/2 flex items-center gap-4 bg-white/80 backdrop-blur-md px-6 py-3 rounded-full z-20 border border-slate-200 shadow-xl">
            @for (img of product.images; track img) {
            <button 
              (click)="selectImage(img)"
              [class.bg-eco-green]="selectedImage === img"
              [class.w-8]="selectedImage === img"
              [class.w-3]="selectedImage !== img"
              [class.bg-slate-300]="selectedImage !== img"
              class="h-3 rounded-full transition-all duration-300 focus:outline-none hover:bg-slate-400 shadow-sm">
            </button>
            }
          </div>
          }
        </div>
      </div>
      
      <!-- Details Column -->
      <div appScrollReveal class="w-full flex flex-col pt-4">
        <div class="inline-block px-4 py-1.5 rounded-full bg-green-100 text-eco-dark font-semibold text-sm w-fit mb-6 border border-green-200">
          Premium Series
        </div>
        
        <h1 class="text-3xl md:text-4xl lg:text-5xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-slate-900 to-slate-700 tracking-tight mb-6 leading-tight">
          {{ product.title }}
        </h1>
        
        <p class="text-xl md:text-2xl text-slate-600 font-light mb-10 leading-relaxed">
          {{ product.summary }}
        </p>

        <!-- Content wrapper with typography styles -->
        <div class="prose prose-lg max-w-none prose-headings:text-slate-800 prose-headings:font-bold prose-p:text-slate-600 prose-a:text-eco-green hover:prose-a:text-eco-dark prose-ul:bg-white/60 prose-ul:backdrop-blur-sm prose-ul:p-8 prose-ul:rounded-xl prose-ul:border prose-ul:border-slate-200 prose-li:text-slate-600 prose-li:marker:text-eco-green mb-12 shadow-sm">
          <div [innerHTML]="product.content"></div>
        </div>
        
        <!-- CTA Section -->
        <div appScrollReveal class="mt-auto relative bg-gradient-to-br from-white to-slate-50 p-8 md:p-10 rounded-xl shadow-[0_20px_50px_rgba(0,0,0,0.06)] border border-slate-200 overflow-hidden group/cta">
          <!-- CTA Background Glow -->
          <div class="absolute -right-20 -top-20 w-64 h-64 bg-eco-green/10 rounded-full blur-[80px] group-hover/cta:bg-eco-green/20 transition-colors duration-700"></div>
          
          <div class="relative z-10 flex flex-col md:flex-row md:items-center justify-between gap-8">
            <div>
              <h3 class="text-3xl font-bold text-slate-800 mb-2">Ready to upgrade?</h3>
              <p class="text-slate-500 text-lg">Get a personalized quote from our experts.</p>
            </div>
            
            <a href="/#contact" class="inline-flex shrink-0 justify-center items-center px-8 py-4 border border-transparent text-lg font-bold rounded-lg text-white bg-gradient-to-r from-eco-green to-emerald-400 hover:from-eco-dark hover:to-eco-green shadow-[0_4px_20px_rgba(16,185,129,0.2)] hover:shadow-[0_8px_30px_rgba(16,185,129,0.4)] transition-all duration-300 transform hover:-translate-y-1">
              Request Quote
              <span class="material-symbols-outlined ml-3 text-2xl">arrow_forward</span>
            </a>
          </div>
        </div>
      </div>
    </div>
  </div>
  }
</div>
