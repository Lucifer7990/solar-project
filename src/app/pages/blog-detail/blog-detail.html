<div class="py-16 bg-white min-h-screen">
  <article *ngIf="blog" class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8">
    <a routerLink="/blog" class="inline-flex items-center text-yellow-600 hover:text-yellow-700 font-semibold mb-8 transition-colors">
      <span class="material-symbols-outlined mr-2">arrow_back</span>
      Back to Blog
    </a>
    
    <header class="mb-10 text-center">
      <h1 class="text-4xl md:text-5xl font-extrabold text-slate-800 tracking-tight mb-6">
        {{ blog.title }}
      </h1>
      <div class="flex items-center justify-center text-slate-500 gap-4 font-medium">
        <span class="flex items-center gap-1"><span class="material-symbols-outlined text-[20px]">calendar_today</span> {{ blog.date | date:'longDate' }}</span>
        <span class="w-1.5 h-1.5 bg-slate-300 rounded-full"></span>
        <span class="flex items-center gap-1"><span class="material-symbols-outlined text-[20px]">person</span> {{ blog.author }}</span>
      </div>
    </header>

    <div class="w-full h-[400px] md:h-[500px] mb-12 rounded-3xl overflow-hidden shadow-lg">
      <img [src]="blog.image" [alt]="blog.title" loading="eager" class="w-full h-full object-cover" />
    </div>

    <!-- Blog Content wrapper with typography styles -->
    <div class="prose prose-lg prose-slate max-w-none prose-headings:font-bold prose-a:text-yellow-600 hover:prose-a:text-yellow-700 prose-img:rounded-xl">
      <div [innerHTML]="blog.content"></div>
    </div>
    
    <!-- CTA Section -->
    <div class="mt-16 bg-slate-50 p-8 md:p-12 rounded-3xl border border-slate-100 text-center">
      <h3 class="text-2xl font-bold text-slate-800 mb-4">Ready to Start Your Solar Journey?</h3>
      <p class="text-slate-600 mb-8 max-w-2xl mx-auto">Get a free, no-obligation quote from our WA-based solar experts today and start saving on your energy bills.</p>
      <a href="#contact" class="inline-flex justify-center items-center px-8 py-4 border border-transparent text-lg font-bold rounded-xl text-slate-900 bg-yellow-400 hover:bg-yellow-500 shadow-sm hover:shadow-md transition-all duration-300">
        Get a Free Quote
      </a>
    </div>
  </article>
</div>
